<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WordPress Demo</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #00a8ff, #9c88ff);
        color: white;
      }
      .card {
        max-width: 640px;
        margin: 24px;
        padding: 32px;
        border-radius: 16px;
        background: rgba(0, 0, 0, 0.2);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        text-align: center;
      }
      a.button {
        display: inline-block;
        margin-top: 24px;
        padding: 12px 24px;
        border-radius: 999px;
        text-decoration: none;
        color: #1f1f1f;
        background: #ffd32a;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Demo Site Live</h1>
      <p>This is a simple demo page created in your repository.</p>
      <p>Push this file to GitHub and enable GitHub Pages for a live demo URL.</p>
      <a class="button" href="https://github.com/akshadpoundrik-debug/wordpress" target="_blank" rel="noopener noreferrer">Open repo on GitHub</a>
    </div>
  </body>
</html>
